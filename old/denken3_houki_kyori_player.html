<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>電験三種 法規・距離50問 聞き流しプレーヤー</title>
<style>
  :root{
    --paper:#EEF1F4;
    --ink:#1B2530;
    --steel:#33526E;
    --volt:#F5B800;
    --volt-deep:#C79300;
    --card:#FFFFFF;
    --line:#D5DBE1;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;
    background:var(--paper);color:var(--ink);
    display:flex;flex-direction:column;min-height:100dvh;
  }
  header{
    padding:14px 18px 10px;
    border-bottom:3px solid var(--ink);
    display:flex;align-items:baseline;justify-content:space-between;gap:8px;
  }
  header h1{font-size:15px;font-weight:800;letter-spacing:.04em}
  header .sub{font-size:11px;color:var(--steel);font-weight:600}

  main{flex:1;display:flex;flex-direction:column;padding:16px 18px;gap:14px;max-width:560px;width:100%;margin:0 auto}

  .qcard{
    background:var(--card);border:1.5px solid var(--line);border-radius:16px;
    padding:18px 18px 20px;min-height:170px;
    display:flex;flex-direction:column;gap:10px;
    box-shadow:0 2px 10px rgba(27,37,48,.06);
  }
  .qmeta{display:flex;align-items:center;gap:10px}
  .qnum{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:13px;font-weight:700;color:var(--ink);
    background:var(--volt);padding:3px 10px;border-radius:999px;
  }
  .qcat{font-size:12px;font-weight:700;color:var(--steel);letter-spacing:.05em}
  .qtext{font-size:17px;line-height:1.65;font-weight:600}
  .answer{
    margin-top:auto;padding-top:12px;border-top:1.5px dashed var(--line);
    display:flex;align-items:baseline;gap:10px;min-height:56px;
  }
  .answer .val{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:40px;font-weight:800;letter-spacing:-.02em;
    color:var(--ink);opacity:0;transition:opacity .25s;
  }
  .answer .memo{font-size:12px;color:var(--steel);line-height:1.5;opacity:0;transition:opacity .25s}
  .answer.shown .val,.answer.shown .memo{opacity:1}

  .stage{display:flex;align-items:center;justify-content:center;gap:26px;padding:4px 0}
  .skip{
    width:52px;height:52px;border-radius:50%;border:1.5px solid var(--line);
    background:var(--card);font-size:18px;color:var(--steel);cursor:pointer;font-weight:700;
  }
  .playwrap{position:relative;width:112px;height:112px}
  svg.ring{position:absolute;inset:0;transform:rotate(-90deg)}
  svg.ring circle{fill:none;stroke-width:6}
  svg.ring .bg{stroke:var(--line)}
  svg.ring .fg{stroke:var(--volt);stroke-linecap:round;transition:stroke-dashoffset .2s linear}
  #playBtn{
    position:absolute;inset:10px;border-radius:50%;border:none;cursor:pointer;
    background:var(--ink);color:var(--volt);
    font-size:34px;font-weight:800;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 14px rgba(27,37,48,.25);
  }
  #playBtn:active{transform:scale(.96)}
  .stage-label{text-align:center;font-size:12px;color:var(--steel);font-weight:700;min-height:16px;letter-spacing:.06em}

  .progress{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--steel);font-weight:700}
  .bar{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--volt-deep);border-radius:3px;transition:width .3s}

  .panel{
    background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 16px;
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
  }
  .panel .full{grid-column:1/-1}
  .field label{display:block;font-size:11px;font-weight:800;color:var(--steel);letter-spacing:.06em;margin-bottom:5px}
  select,.field .seg{width:100%}
  select{
    padding:9px 10px;border:1.5px solid var(--line);border-radius:10px;
    font-size:14px;font-weight:600;background:var(--paper);color:var(--ink);
  }
  .seg{display:flex;border:1.5px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{
    flex:1;padding:9px 0;border:none;background:var(--paper);
    font-size:13px;font-weight:700;color:var(--steel);cursor:pointer;
  }
  .seg button.on{background:var(--ink);color:var(--volt)}
  .toggles{display:flex;gap:14px;flex-wrap:wrap}
  .tgl{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--ink)}
  .tgl input{width:18px;height:18px;accent-color:var(--volt-deep)}

  footer{padding:10px 18px 16px;text-align:center;font-size:11px;color:var(--steel);line-height:1.6}
  .warn{color:#9A4B00;font-weight:700}
</style>
</head>
<body>

<header>
  <h1>法規・距離50問 聞き流し</h1>
  <span class="sub">電験三種 ウォーキング用</span>
</header>

<main>
  <div class="qcard">
    <div class="qmeta">
      <span class="qnum" id="qnum">問 1</span>
      <span class="qcat" id="qcat">架空電線の高さ</span>
    </div>
    <div class="qtext" id="qtext">▶ を押すと再生が始まります。音量をオンにしてください。</div>
    <div class="answer" id="ansbox">
      <span class="val" id="ansval">–</span>
      <span class="memo" id="ansmemo"></span>
    </div>
  </div>

  <div class="stage">
    <button class="skip" id="prevBtn" aria-label="前の問題">⏮</button>
    <div class="playwrap">
      <svg class="ring" viewBox="0 0 112 112">
        <circle class="bg" cx="56" cy="56" r="52"></circle>
        <circle class="fg" id="ringfg" cx="56" cy="56" r="52"></circle>
      </svg>
      <button id="playBtn" aria-label="再生">▶</button>
    </div>
    <button class="skip" id="nextBtn" aria-label="次の問題">⏭</button>
  </div>
  <div class="stage-label" id="stageLabel">停止中</div>

  <div class="progress">
    <span id="progText">0 / 50</span>
    <div class="bar"><i id="progBar"></i></div>
  </div>

  <div class="panel">
    <div class="field full">
      <label>出題範囲</label>
      <select id="rangeSel"></select>
    </div>
    <div class="field">
      <label>考える間(ポーズ)</label>
      <div class="seg" id="pauseSeg">
        <button data-v="2">2秒</button>
        <button data-v="4" class="on">4秒</button>
        <button data-v="7">7秒</button>
      </div>
    </div>
    <div class="field">
      <label>読み上げ速度</label>
      <div class="seg" id="rateSeg">
        <button data-v="0.9">ゆっくり</button>
        <button data-v="1.1" class="on">ふつう</button>
        <button data-v="1.3">速め</button>
      </div>
    </div>
    <div class="field full toggles">
      <label class="tgl"><input type="checkbox" id="shuffleChk">シャッフル</label>
      <label class="tgl"><input type="checkbox" id="loopChk" checked>くり返し再生</label>
      <label class="tgl"><input type="checkbox" id="echoChk" checked>答えのあと復唱</label>
    </div>
  </div>
</main>

<footer>
  スマホは<span class="warn">画面ロックすると音声が止まる</span>ことがあります。画面オンのままポケットへ。<br>
  数値は電気設備技術基準の解釈に基づく学習用です。最新条文で確認を。
</footer>

<script>
const DATA = [
 // cat, 表示用問題文, 読み上げ用問題文, 表示答え, 読み上げ答え, メモ
 {c:"架空電線の高さ",q:"低高圧架空電線が道路(車道)を横断。路面上何m以上?",s:"低圧、高圧の架空電線が、道路を横断する場合。路面上、何メートル以上?",a:"6 m",as:"6メートル",m:"高さの基本「6・5.5・5」"},
 {c:"架空電線の高さ",q:"低高圧架空電線が鉄道・軌道を横断。レール面上何m以上?",s:"低高圧架空電線が、鉄道または軌道を横断する場合。レール面上、何メートル以上?",a:"5.5 m",as:"5.5メートル",m:"レール面上で測る"},
 {c:"架空電線の高さ",q:"低圧架空電線を横断歩道橋の上に施設。路面上何m以上?",s:"低圧架空電線を、横断歩道橋の上に施設する場合。路面上、何メートル以上?",a:"3 m",as:"3メートル",m:"低圧は3m"},
 {c:"架空電線の高さ",q:"高圧架空電線を横断歩道橋の上に施設。路面上何m以上?",s:"高圧架空電線を、横断歩道橋の上に施設する場合。路面上、何メートル以上?",a:"3.5 m",as:"3.5メートル",m:"高圧は低圧プラス0.5m"},
 {c:"架空電線の高さ",q:"低高圧架空電線、その他一般の場所。地表上何m以上?",s:"低高圧架空電線。その他、一般の場所では、地表上、何メートル以上?",a:"5 m",as:"5メートル",m:"原則値"},
 {c:"架空電線の高さ",q:"低圧で道路以外・交通に支障なしの場合、何mまで緩和?",s:"低圧架空電線で、道路以外、交通に支障がない場合。何メートルまで緩和できる?",a:"4 m",as:"4メートル",m:"低圧のみの緩和"},
 {c:"地中電線路",q:"直接埋設式、重量物の圧力を受けるおそれあり。深さ何m以上?",s:"直接埋設式の地中電線路。重量物の圧力を受けるおそれがある場所。埋設の深さは、何メートル以上?",a:"1.2 m",as:"1.2メートル",m:"車道の下など"},

 {c:"地中電線路",q:"低高圧地中電線と地中弱電流電線の離隔は何m以上?",s:"低圧または高圧の地中電線と、地中弱電流電線との離隔距離は、何メートル以上?",a:"0.3 m",as:"0.3メートル",m:"隔壁がない場合"},
 {c:"地中電線路",q:"特別高圧地中電線と地中弱電流電線の離隔は何m以上?",s:"特別高圧の地中電線と、地中弱電流電線との離隔距離は、何メートル以上?",a:"0.6 m",as:"0.6メートル",m:"特高は倍の0.6m"},
 {c:"地中電線路",q:"低圧地中電線と高圧地中電線の離隔は何m以上?",s:"低圧の地中電線と、高圧の地中電線との離隔距離は、何メートル以上?",a:"0.15 m",as:"0.15メートル",m:"低圧×高圧"},
 {c:"地中電線路",q:"低高圧地中電線と特別高圧地中電線の離隔は何m以上?",s:"低高圧の地中電線と、特別高圧の地中電線との離隔距離は、何メートル以上?",a:"0.3 m",as:"0.3メートル",m:"低高圧×特高"},

 {c:"さく・へい",q:"35kV超160kV以下:高さ+距離の和は何m以上?",s:"使用電圧35キロボルトを超え、160キロボルト以下。高さと距離の和は、何メートル以上?",a:"6 m",as:"6メートル",m:""},
 {c:"さく・へい",q:"160kV超:10kVごとに何m加算する?",s:"使用電圧160キロボルト超。160キロボルトを超える10キロボルトごとに、何メートル加算する?",a:"0.12 m",as:"0.12メートル",m:"端数は切上げ"},
 {c:"さく・へい",q:"使用電圧220kVのとき、高さ+距離の和は何m以上?",s:"使用電圧220キロボルトのとき。高さと距離の和は、何メートル以上?",a:"6.72 m",as:"6.72メートル",m:"6+6×0.12"},
 {c:"引込線",q:"低圧架空引込線が道路を横断。路面上何m以上?",s:"低圧架空引込線が、道路を横断する場合。路面上、何メートル以上?",a:"5 m",as:"5メートル",m:"支障なければ3m"},
 {c:"引込線",q:"低圧架空引込線が鉄道・軌道を横断。レール面上何m以上?",s:"低圧架空引込線が、鉄道または軌道を横断する場合。レール面上、何メートル以上?",a:"5.5 m",as:"5.5メートル",m:"鉄道は変わらず"},
 {c:"引込線",q:"低圧架空引込線を横断歩道橋の上に施設。路面上何m以上?",s:"低圧架空引込線を、横断歩道橋の上に施設する場合。路面上、何メートル以上?",a:"3 m",as:"3メートル",m:""},
 {c:"引込線",q:"低圧引込線、やむを得ず交通に支障なしの最小高さは?",s:"低圧架空引込線。技術上やむを得ず、交通に支障がない場合の、最小の高さは、何メートル?",a:"2.5 m",as:"2.5メートル",m:"引込線の最小値"},
 {c:"引込線",q:"高圧引込線、下面に危険表示をした場合は何m以上まで緩和?",s:"高圧架空引込線。電線の下面に、危険である旨の表示をした場合。何メートル以上まで緩和できる?",a:"3.5 m",as:"3.5メートル",m:"危険表示とセット"},
 {c:"建造物との離隔",q:"低高圧架空電線と上部造営材の上方の離隔は何m以上?",s:"低高圧架空電線と、建造物の上部造営材の、上方との離隔距離は、何メートル以上?",a:"2 m",as:"2メートル",m:"上方は2m"},
 {c:"建造物との離隔",q:"高圧でケーブル使用時、上部造営材の上方は何m以上?",s:"高圧架空電線に、ケーブルを使用する場合。上部造営材の上方との離隔は、何メートル以上?",a:"1 m",as:"1メートル",m:"ケーブルで半分"},
 {c:"建造物との離隔",q:"低高圧架空電線と造営材(側方・下方)の離隔は何m以上?",s:"低高圧架空電線と、建造物の造営材、側方や下方との離隔距離は、何メートル以上?",a:"1.2 m",as:"1.2メートル",m:""},
 {c:"建造物との離隔",q:"ケーブル使用時、造営材(上方以外)との離隔は何m以上?",s:"ケーブルを使用する場合。造営材の、上方以外との離隔は、何メートル以上?",a:"0.4 m",as:"0.4メートル",m:""},
 {c:"建造物との離隔",q:"35kV以下の特別高圧架空電線と建造物の離隔は何m以上?",s:"使用電圧35キロボルト以下の、特別高圧架空電線と、建造物との離隔距離は、何メートル以上?",a:"3 m",as:"3メートル",m:""},
 {c:"特高の高さ",q:"35kV以下の特高架空電線が道路を横断。路面上何m以上?",s:"使用電圧35キロボルト以下の、特別高圧架空電線が、道路を横断する場合。路面上、何メートル以上?",a:"6 m",as:"6メートル",m:"低高圧と同じ体系"},

 {c:"離隔距離",q:"高圧架空電線とアンテナの離隔は何m以上?",s:"高圧架空電線と、アンテナとの離隔距離は、何メートル以上?",a:"0.8 m",as:"0.8メートル",m:""},
 {c:"併架・共架",q:"低圧と高圧を同一支持物に併架。離隔は何m以上?",s:"低圧架空電線と、高圧架空電線を、同一支持物に施設する、併架の場合。離隔距離は、何メートル以上?",a:"0.5 m",as:"0.5メートル",m:"併架は0.5m"},
 {c:"併架・共架",q:"低圧架空電線と弱電流電線の共架。離隔は何m以上?",s:"低圧架空電線と、架空弱電流電線を共架する場合。離隔距離は、何メートル以上?",a:"0.75 m",as:"0.75メートル",m:""},
 {c:"併架・共架",q:"高圧架空電線と弱電流電線の共架。離隔は何m以上?",s:"高圧架空電線と、架空弱電流電線を共架する場合。離隔距離は、何メートル以上?",a:"1.5 m",as:"1.5メートル",m:"低圧の倍"},
 {c:"支持物・径間",q:"昇塔防止:足場金具は地表上何m以上に施設?",s:"昇塔防止のため、足場金具などは、地表上、何メートル以上の高さに施設する?",a:"1.8 m",as:"1.8メートル",m:"定番数値"},
 {c:"支持物・径間",q:"道路を横断する支線の高さは路面上何m以上?",s:"道路を横断して施設する支線の高さは、路面上、何メートル以上?",a:"5 m",as:"5メートル",m:"支障なし4.5m/歩行のみ2.5m"},
 {c:"支持物・径間",q:"高圧架空電線路、A種柱・木柱の径間は何m以下?",s:"高圧架空電線路。A種鉄筋コンクリート柱や、木柱の径間は、何メートル以下?",a:"150 m",as:"150メートル",m:"150・250・600"},
 {c:"支持物・径間",q:"B種柱の径間は何m以下?",s:"B種鉄筋コンクリート柱、B種鉄柱の径間は、何メートル以下?",a:"250 m",as:"250メートル",m:""},
 {c:"支持物・径間",q:"鉄塔の径間は何m以下?",s:"鉄塔を支持物とする場合の径間は、何メートル以下?",a:"600 m",as:"600メートル",m:""},
 {c:"支持物・径間",q:"架空ケーブルのハンガー間隔は何m以下?",s:"架空ケーブルを、ちょう架用線にハンガーで支持する場合。ハンガーの間隔は、何メートル以下?",a:"0.5 m",as:"0.5メートル",m:"50cm以下"},
 {c:"接地工事",q:"接地極は地下何m以上の深さに埋設する?",s:"接地極は、地下、何メートル以上の深さに埋設する?",a:"0.75 m",as:"0.75メートル",m:""},
 {c:"接地工事",q:"接地線は地下0.75mから地表上何mまでを合成樹脂管等で覆う?",s:"接地線は、地下0.75メートルから、地表上、何メートルまでを、合成樹脂管などで覆う?",a:"2 m",as:"2メートル",m:""},
 {c:"接地工事",q:"接地極を鉄柱等に近接施設:金属体から何m以上離す?",s:"接地極を、鉄柱などに近接して施設する場合。底面から0.3メートル以上深くするか、金属体から、何メートル以上離す?",a:"1 m",as:"1メートル",m:"0.3m深く or 1m離す"},
 {c:"機械器具・屋内",q:"市街地の高圧機械器具は地表上何m以上の高さに施設?",s:"市街地に施設する、高圧の機械器具は、地表上、何メートル以上の高さに施設する?",a:"4.5 m",as:"4.5メートル",m:"市街地外は4m"},
 {c:"機械器具・屋内",q:"がいし引き工事:低圧屋内配線の電線相互の間隔は何cm以上?",s:"がいし引き工事による、低圧屋内配線。電線相互の間隔は、何センチメートル以上?",a:"6 cm",as:"6センチメートル",m:"造営材とは2.5cm"},
];

// ---------- state ----------
let order = DATA.map((_,i)=>i);
let pos = 0;
let playing = false;
let pauseSec = 4, rate = 1.1;
let timers = [];
let wakeLock = null;
const $ = id => document.getElementById(id);

// ---------- range selector ----------
const cats = [...new Set(DATA.map(d=>d.c))];
const rangeSel = $("rangeSel");
rangeSel.innerHTML = '<option value="ALL">すべて(50問)</option>' +
  cats.map(c=>{const n=DATA.filter(d=>d.c===c).length;return `<option value="${c}">${c}(${n}問)</option>`}).join("");

function buildOrder(){
  const v = rangeSel.value;
  order = DATA.map((_,i)=>i).filter(i => v==="ALL" || DATA[i].c===v);
  if($("shuffleChk").checked){
    for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
  }
  pos = 0;
}

// ---------- speech ----------
let jaVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices().filter(v=>v.lang && v.lang.startsWith("ja"));
  jaVoice = vs.find(v=>/Kyoko|O-?ren|Google.*日本語|Haruka|Ayumi/i.test(v.name)) || vs[0] || null;
}
speechSynthesis.onvoiceschanged = pickVoice; pickVoice();

function speak(text){
  return new Promise(res=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP"; u.rate = rate; u.pitch = 1;
    if(jaVoice) u.voice = jaVoice;
    u.onend = ()=>res(); u.onerror = ()=>res();
    speechSynthesis.speak(u);
  });
}
function wait(ms){return new Promise(r=>{const t=setTimeout(r,ms);timers.push(t);});}
function clearTimers(){timers.forEach(clearTimeout);timers=[];}

// ---------- ring countdown ----------
const CIRC = 2*Math.PI*52;
const ring = $("ringfg");
ring.style.strokeDasharray = CIRC; ring.style.strokeDashoffset = CIRC;
function setRing(frac){ring.style.strokeDashoffset = CIRC*(1-frac);}
async function countdown(sec){
  const steps = sec*5;
  for(let i=0;i<=steps;i++){
    if(!playing) return;
    setRing(i/steps);
    if(i<steps) await wait(200);
  }
}

// ---------- UI ----------
function renderQ(i, hideAns){
  const d = DATA[i];
  $("qnum").textContent = "問 " + (DATA.indexOf(d)+1);
  $("qcat").textContent = d.c;
  $("qtext").textContent = d.q;
  $("ansval").textContent = d.a;
  $("ansmemo").textContent = d.m;
  $("ansbox").classList.toggle("shown", !hideAns);
  $("progText").textContent = (pos+1) + " / " + order.length;
  $("progBar").style.width = ((pos+1)/order.length*100) + "%";
}

// ---------- main loop ----------
async function playLoop(){
  while(playing){
    if(pos >= order.length){
      if($("loopChk").checked){ buildOrder(); }
      else { stop("おつかれさま!全問終了"); return; }
    }
    const idx = order[pos];
    const d = DATA[idx];
    setRing(0);
    renderQ(idx, true);
    $("stageLabel").textContent = "問題を読み上げ中";
    await speak("問、" + (idx+1) + "。" + d.s);
    if(!playing) return;

    $("stageLabel").textContent = "考える時間 " + pauseSec + "秒";
    await countdown(pauseSec);
    if(!playing) return;

    $("ansbox").classList.add("shown");
    $("stageLabel").textContent = "答え";
    await speak("答えは、" + d.as + "。");
    if(!playing) return;
    if($("echoChk").checked){
      await speak(d.as + "、以上。");
      if(!playing) return;
    }
    await wait(1200);
    pos++;
  }
}

function start(){
  playing = true;
  $("playBtn").textContent = "❚❚";
  requestWakeLock();
  playLoop();
}
function stop(label){
  playing = false;
  clearTimers();
  speechSynthesis.cancel();
  setRing(0);
  $("playBtn").textContent = "▶";
  $("stageLabel").textContent = label || "一時停止中";
  if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null;}
}
async function requestWakeLock(){
  try{ if("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); }catch(e){}
}

// ---------- events ----------
$("playBtn").addEventListener("click", ()=> playing ? stop() : start());
$("nextBtn").addEventListener("click", ()=>{ const was=playing; stop(); pos=Math.min(pos+1,order.length-1); renderQ(order[pos],true); if(was) start(); });
$("prevBtn").addEventListener("click", ()=>{ const was=playing; stop(); pos=Math.max(pos-1,0); renderQ(order[pos],true); if(was) start(); });
rangeSel.addEventListener("change", ()=>{ stop(); buildOrder(); renderQ(order[0],true); });
$("shuffleChk").addEventListener("change", ()=>{ stop(); buildOrder(); renderQ(order[0],true); });

document.querySelectorAll(".seg").forEach(seg=>{
  seg.addEventListener("click", e=>{
    const b = e.target.closest("button"); if(!b) return;
    seg.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    const v = parseFloat(b.dataset.v);
    if(seg.id==="pauseSeg") pauseSec = v; else rate = v;
  });
});

buildOrder();
renderQ(order[0], true);
</script>
</body>
</html>
